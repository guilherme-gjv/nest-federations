type Post @key(fields: "id") {
  id: Int!
  title: String!
  content: String!
  authorId: Int!
  author: User
}

input CreatePostInput {
  title: String!
  content: String!
  authorId: Int!
}

type Query {
  posts: [Post]!
  post(id: Int!): Post
}

type Mutation {
  createPost(createPostInput: CreatePostInput!): Post!
}

extend type User @key(fields: "id") {
  id: ID! @external
  posts: [Post]
}
